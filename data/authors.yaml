  description: |
    The fifteen sermons printed under the name of Boniface of Mainz (c. 675–754) in Migne's Patrologia Latina (vol. 89, cols. 843–872) are today regarded by scholars as pseudo-Bonifacian — that is, transmitted under his name but not securely attributable to his pen. The collection was assembled for the Martène–Durand edition from a manuscript owned by Chancellor Daguesseau containing fourteen sermons, collated against two Swedish royal manuscripts identified by Mabillon, with a fifteenth added from a separate source; there is no single manuscript witness to all fifteen together. The Vatican manuscript bearing fourteen of the sermons carries the rubric Sermones sancti Bonifacii martiris ad populum et de baptismo, which locates them in an early medieval missionary context and associates them with Boniface's name, but the sermons are absent from Levison's critical MGH edition and from other standard collections of Boniface's authentic works. Current scholarship connects the collection to insular circles on the Continent and to Carolingian reform thought, with strong parallels to the Admonitio Generalis and Alcuinian theology, suggesting a late eighth- or early ninth-century compilation drawing on preaching materials from Boniface's missionary milieu. Whatever their precise origin, the sermons are historically significant documents of early medieval catechesis: addressed to recently converted or imperfectly Christianised communities, they offer a vivid picture of the doctrinal instruction, moral formation, and practical Christian duties — including the renunciation of surviving pagan practices — that defined the Bonifacian mission in Germania. This is the first English translation of the pseudo-Bonifacian sermons.