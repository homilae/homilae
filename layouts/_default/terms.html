<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — Homiliae</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/reader.css">
  <link rel="stylesheet" href="/css/taxonomy.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="wordmark">Homiliae</a>
    <nav>
      <a href="/homilies">Browse</a>
      <a href="/search">Search</a>
      <a href="/scriptures">Scripture Index</a>
      <a href="/about">About</a>
    </nav>
  </header>

  <div class="taxonomy-wrap">
    <div class="taxonomy-hero">
      <div class="taxonomy-type">{{ .Type | humanize }}</div>
      <h1>{{ .Title }}</h1>
      <p>{{ len .Data.Terms }} {{ .Type | humanize | lower }} in the archive</p>
    </div>

    <div class="terms-grid">
      {{ range .Data.Terms.Alphabetical }}
      <a class="term-card" href="{{ .Page.Permalink }}">
        <div class="term-name">{{ .Page.Title }}</div>
        <div class="term-count">{{ .Count }} {{ if eq .Count 1 }}homily{{ else }}homilies{{ end }}</div>
      </a>
      {{ end }}
    </div>
  </div>
</body>
</html>
